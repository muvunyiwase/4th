<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Contact Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #535da1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #434a7a;
        }
        .alert {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Test Contact Form</h1>
    <p>This is a simplified test to verify the backend API is working.</p>
    
    <div id="status" class="status">
        Testing backend connection...
    </div>
    
    <form id="testForm">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required value="Test User">
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required value="test@example.com">
        </div>
        
        <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="4" required>This is a test message from the contact form.</textarea>
        </div>
        
        <div class="form-group">
            <label>Services (checkboxes will send as "1" if checked):</label>
            <div>
                <input type="checkbox" id="website" name="website" value="1" checked>
                <label for="website" style="display: inline; font-weight: normal;">Websites</label>
            </div>
            <div>
                <input type="checkbox" id="branding" name="branding" value="1">
                <label for="branding" style="display: inline; font-weight: normal;">Branding</label>
            </div>
        </div>
        
        <button type="submit">Send Test Message</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        // Test backend connection
        async function testBackend() {
            const statusEl = document.getElementById('status');
            const possiblePorts = [3000, 3001, 3002, 3003];
            
            for (const port of possiblePorts) {
                try {
                    const response = await fetch(`http://localhost:${port}/api/health`, {
                        timeout: 2000
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        statusEl.innerHTML = `✅ Backend found on port ${port}<br>Status: ${data.status}<br>Message: ${data.message}`;
                        statusEl.style.background = '#d4edda';
                        statusEl.style.color = '#155724';
                        return port;
                    }
                } catch (error) {
                    continue;
                }
            }
            
            statusEl.innerHTML = '❌ Backend not found on common ports (3000-3003)<br>Make sure backend is running: <code>cd backend && npm run simple</code>';
            statusEl.style.background = '#f8d7da';
            statusEl.style.color = '#721c24';
            return null;
        }
        
        // Handle form submission
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const port = await testBackend();
            if (!port) {
                showResult('Backend not running. Start it first.', 'danger');
                return;
            }
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                website: document.getElementById('website').checked ? '1' : '0',
                branding: document.getElementById('branding').checked ? '1' : '0',
                ecommerce: '0',
                seo: '0',
                message: document.getElementById('message').value
            };
            
            const button = this.querySelector('button');
            const originalText = button.textContent;
            button.textContent = 'Sending...';
            button.disabled = true;
            
            try {
                const response = await fetch(`http://localhost:${port}/api/contact`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult(`✅ Success!<br>Message: ${result.message}<br><br>Response data:<br><pre>${JSON.stringify(result, null, 2)}</pre>`, 'success');
                } else {
                    showResult(`❌ Failed: ${result.message}`, 'danger');
                }
            } catch (error) {
                showResult(`❌ Error: ${error.message}`, 'danger');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        });
        
        function showResult(message, type) {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }
        
        // Initial test
        testBackend();
    </script>
</body>
</html>
